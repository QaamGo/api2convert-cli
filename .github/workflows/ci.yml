name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # allow running the suite (incl. the live job) on demand

permissions:
  contents: read

# The CLI builds against the published Go SDK pinned in go.mod
# (github.com/QaamGo/api2convert-go/v10), so a plain checkout is all each job
# needs. Local co-development uses a gitignored go.work pointing at a sibling
# ../api2convert-go checkout; that file never ships, so CI resolves the module
# from the proxy.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # always take the newest 1.25.x so govulncheck sees toolchain security fixes
          cache: true
          cache-dependency-path: go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - uses: golangci/golangci-lint-action@v9
        with:
          # action v9 requires golangci-lint v2. The prebuilt v2.12.2 binary is built
          # with a current Go toolchain, so the default (binary) install mode analyses
          # go1.25 code fine — the old goinstall workaround is no longer needed.
          # v2 config lives in .golangci.yml; timeout moved to a CLI flag in v2.
          version: v2.12.2
          args: --timeout=5m

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # always take the newest 1.25.x so govulncheck sees toolchain security fixes
          cache: true
          cache-dependency-path: go.sum
      - run: go build ./...
      - run: go test ./...

  vulncheck:
    # Catch known vulnerabilities in dependencies and the toolchain. govulncheck
    # reports only vulns reachable from our code, so it rarely false-positives.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # always take the newest 1.25.x so govulncheck sees toolchain security fixes
          cache: true
          cache-dependency-path: go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  release-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # always take the newest 1.25.x so govulncheck sees toolchain security fixes
          cache: true
          cache-dependency-path: go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          # This job has no signing secrets (or minisign), so skip signing here.
          # Real signing is validated by release.yml's manual snapshot dry-run.
          args: release --snapshot --clean --skip=publish,sign

  live:
    # Live tests hit the real API and consume quota; run on the default branch and
    # on manual dispatch (not on PRs). REQUIRED: the step below fails the build if
    # the API2CONVERT_API_KEY secret is missing, so the suite can never silently skip.
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # always take the newest 1.25.x so govulncheck sees toolchain security fixes
          cache: true
          cache-dependency-path: go.sum
      - name: Live conformance (required — no silent skip)
        run: |
          if [ -z "$API2CONVERT_API_KEY" ]; then
            echo "::error::API2CONVERT_API_KEY secret is not set — the live conformance suite cannot run"
            exit 1
          fi
          go test -tags=live -timeout 600s ./live/...
