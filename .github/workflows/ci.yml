name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # allow running the suite (incl. the live job) on demand

permissions:
  contents: read

# The CLI builds against the sibling Go SDK via a local `replace ../api2convert-go`
# in go.mod, so every job checks out both repos side by side under the workspace and
# runs the Go tooling from the api2convert-cli directory. api2convert-go is public,
# so no credential is needed.

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api2convert-cli
    steps:
      - uses: actions/checkout@v5
        with:
          path: api2convert-cli
      - uses: actions/checkout@v5
        with:
          repository: QaamGo/api2convert-go
          ref: main
          path: api2convert-go
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: api2convert-cli/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - uses: golangci/golangci-lint-action@v9
        with:
          # action v9 requires golangci-lint v2. The prebuilt v2.12.2 binary is built
          # with a current Go toolchain, so the default (binary) install mode analyses
          # go1.25 code fine — the old goinstall workaround is no longer needed.
          # v2 config lives in .golangci.yml; timeout moved to a CLI flag in v2.
          version: v2.12.2
          args: --timeout=5m
          working-directory: api2convert-cli

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: api2convert-cli
    steps:
      - uses: actions/checkout@v5
        with:
          path: api2convert-cli
      - uses: actions/checkout@v5
        with:
          repository: QaamGo/api2convert-go
          ref: main
          path: api2convert-go
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: api2convert-cli/go.sum
      - run: go build ./...
      - run: go test ./...

  release-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: api2convert-cli
          fetch-depth: 0
      - uses: actions/checkout@v5
        with:
          repository: QaamGo/api2convert-go
          ref: main
          path: api2convert-go
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: api2convert-cli/go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
          workdir: api2convert-cli

  live:
    # Live tests hit the real API and consume quota; run on the default branch and
    # on manual dispatch (not on PRs). REQUIRED: the step below fails the build if
    # the API2CONVERT_API_KEY secret is missing, so the suite can never silently skip.
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api2convert-cli
    env:
      API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: api2convert-cli
      - uses: actions/checkout@v5
        with:
          repository: QaamGo/api2convert-go
          ref: main
          path: api2convert-go
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: api2convert-cli/go.sum
      - name: Live conformance (required — no silent skip)
        run: |
          if [ -z "$API2CONVERT_API_KEY" ]; then
            echo "::error::API2CONVERT_API_KEY secret is not set — the live conformance suite cannot run"
            exit 1
          fi
          go test -tags=live -timeout 600s ./live/...
