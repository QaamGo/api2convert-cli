name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry-run: builds + Authenticode-signs every target but publishes
  # nothing (goreleaser --snapshot). Lets us validate signing without cutting a
  # real release or touching the Homebrew/Scoop taps.
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Dry run: build + sign, do NOT publish"
        type: boolean
        default: true

# Least privilege by default: only the goreleaser job (which creates the Release
# and uploads assets) is granted contents: write. The test job just reads code.
permissions:
  contents: read

jobs:
  # Gate the whole release on the test suite (unit + live conformance). If any
  # test fails — or the live suite can't run because the API2CONVERT_API_KEY
  # secret is missing — goreleaser never runs (needs: test), so a broken or
  # untested commit can never be published. Runs on tag pushes and the manual
  # dry-run alike.
  test:
    runs-on: ubuntu-latest
    env:
      API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          check-latest: true # build releases with the newest 1.25.x (picks up toolchain security fixes)
          cache: true
      - run: go build ./...
      - run: go test ./...
      - name: Live conformance (required — no silent skip)
        run: |
          if [ -z "$API2CONVERT_API_KEY" ]; then
            echo "::error::API2CONVERT_API_KEY secret is not set — the live conformance suite cannot run"
            exit 1
          fi
          go test -tags=live -timeout 600s ./live/...

  goreleaser:
    needs: test
    # WINDOWS runner is REQUIRED: Authenticode signing (Azure Trusted Signing)
    # only runs on Windows. Go still cross-compiles every OS/arch here
    # (CGO_ENABLED=0), so the Linux, macOS and Windows artifacts are all produced
    # from this single job; the Windows exe is signed in place by the GoReleaser
    # build hook (see .goreleaser.yaml) before archiving.
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    defaults:
      run:
        # The assert steps below are written in bash; Git Bash ships on the
        # windows-latest image, so force bash instead of the default PowerShell.
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          check-latest: true # build releases with the newest 1.25.x (picks up toolchain security fixes)
          cache: true

      # Org convention: the tag's base version must equal the committed version
      # constant. A prerelease suffix (-rc.1, -beta, …) is allowed, so RC tags
      # like v1.0.0-rc.1 validate against version.go = 1.0.0. Only meaningful for
      # real tag releases; skipped on the manual dry-run.
      - name: Assert tag matches version.go
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          base="${tag%%-*}"
          ver="$(grep -oE 'version = "[0-9]+\.[0-9]+\.[0-9]+"' version.go | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          echo "tag=$tag base=$base version.go=$ver"
          [ "$base" = "$ver" ] || { echo "::error::tag base $base != version.go $ver"; exit 1; }

      # A local 'replace' must never ship in a release build.
      - name: Assert no replace directive in go.mod
        run: |
          if grep -qE '^\s*replace ' go.mod; then
            echo "::error::go.mod contains a replace directive; remove it before releasing"; exit 1
          fi

      # Azure Trusted Signing CLI, invoked by the windows build hook in
      # .goreleaser.yaml to Authenticode-sign api2convert.exe in place.
      # (.NET SDK is preinstalled on windows-latest.) PowerShell handles the
      # Windows tools path cleanly; the tool is on PATH for later steps.
      - name: Install Azure Trusted Signing CLI (dotnet 'sign')
        shell: pwsh
        run: |
          dotnet tool install --global --prerelease sign
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # Install upstream minisign and put it on PATH for the GoReleaser `signs`
      # block. Chocolatey's package is stuck at v0.8.0 (2021), which cannot read
      # modern secret keys — including password-less (-W) keys — and fails with
      # "Unsupported key derivation function".
      - name: Install minisign
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip' -OutFile minisign.zip
          Expand-Archive -Force minisign.zip minisign-dist
          # The win64 zip ships both x86_64 and aarch64 builds; pick x86_64 for
          # the amd64 runner (a stray aarch64 exe fails with a compatibility error).
          $exe = Get-ChildItem -Recurse -Filter minisign.exe minisign-dist |
                 Where-Object { $_.FullName -match 'x86_64' } | Select-Object -First 1
          if (-not $exe) { throw 'x86_64 minisign.exe not found in the release archive' }
          Add-Content -Path $env:GITHUB_PATH -Value $exe.Directory.FullName

      # Materialize the signing key from the secret for the `signs` block. If
      # MINISIGN_PRIVATE_KEY is unset, GoReleaser fails the sign step loudly
      # rather than shipping an unsigned release.
      - name: Write minisign signing key
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: printf '%s\n' "$MINISIGN_PRIVATE_KEY" > minisign.key

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          # Real tag push -> full release. Manual dry-run -> --snapshot (no publish).
          args: release --clean ${{ (github.event_name == 'workflow_dispatch' && inputs.snapshot) && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on QaamGo/homebrew-tap and QaamGo/scoop-bucket.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          # --- Azure Trusted Signing (consumed by the windows build hook) ---
          # The 3 AZURE_* vars authenticate the service principal
          # (qaamgo-trusted-signing) via DefaultAzureCredential.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}
          # --- macOS Developer ID sign + notarize (consumed by notarize.macos;
          # no-op until these secrets exist). base64 of the .p12 / .p8. ---
          MACOS_SIGN_P12_BASE64: ${{ secrets.MACOS_SIGN_P12_BASE64 }}
          MACOS_SIGN_P12_PASSWORD: ${{ secrets.MACOS_SIGN_P12_PASSWORD }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
