version: 2
project_name: api2convert

before:
  hooks:
    - go mod download

builds:
  # Unix binaries (Linux + macOS). The macOS (darwin) binaries are Developer ID
  # signed + notarized by the `notarize.macos` block below (before archiving);
  # Linux has no OS-level code-signing.
  - id: unix
    main: .
    binary: api2convert
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # Windows binaries — Authenticode-signed IN PLACE via Azure Trusted Signing,
  # after build and BEFORE archiving, so the .zip contains the signed exe.
  # Requires a WINDOWS runner (Authenticode signing is Windows-only) with the
  # 'sign' dotnet tool on PATH (installed in release.yml). Auth is via the
  # AZURE_TENANT_ID/AZURE_CLIENT_ID/AZURE_CLIENT_SECRET env vars
  # (DefaultAzureCredential); endpoint/account/profile come from the
  # TRUSTED_SIGNING_* env vars — all set on the GoReleaser step in release.yml.
  - id: windows
    main: .
    binary: api2convert
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}
    goos: [windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    hooks:
      # Guarded by isEnvSet so it is a NO-OP (renders to `true`) whenever the
      # TRUSTED_SIGNING_* env vars are absent — e.g. the ubuntu `release-dryrun`
      # CI job, which builds with --snapshot and has no signing secrets and no
      # `sign` tool installed. Mirrors the notarize.macos guard below. Go
      # templates never evaluate the untaken branch, so .Env.TRUSTED_SIGNING_*
      # is only touched when it is actually set (the real release.yml run).
      post:
        - cmd: >-
            {{ if isEnvSet "TRUSTED_SIGNING_ENDPOINT" }}sign code artifact-signing --verbosity information --timestamp-url http://timestamp.acs.microsoft.com --artifact-signing-endpoint {{ .Env.TRUSTED_SIGNING_ENDPOINT }} --artifact-signing-account {{ .Env.TRUSTED_SIGNING_ACCOUNT }} --artifact-signing-certificate-profile {{ .Env.TRUSTED_SIGNING_CERT_PROFILE }} {{ .Path }}{{ else }}true{{ end }}
          output: true

# macOS Developer ID sign + notarize the darwin binaries (from the 'unix' build),
# BEFORE archiving, so every tar.gz / Homebrew cask / package carries the
# signed+notarized binary. Cross-platform: GoReleaser bundles `quill` as a Go
# library, so this runs on the same windows-latest runner — no Mac, no extra
# tooling. The `.p12` and `.p8` are passed as base64 strings (no temp files).
# Guarded by isEnvSet so it is a NO-OP until the MACOS_* secrets exist (safe for
# fork PRs and current builds).
# CAVEATS: (1) notarization is SKIPPED under `goreleaser --snapshot`; validate
# via a real (pre)release tag. (2) A bare CLI can't be stapled, so Gatekeeper
# verifies notarization online on first *GUI* launch; Homebrew/Scoop/curl/tar
# installs set no quarantine flag, so they never prompt.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12_BASE64" }}'
      ids:
        - unix
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12_BASE64 }}"
        password: "{{ .Env.MACOS_SIGN_P12_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY_BASE64 }}"
        wait: true
        timeout: 20m

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

homebrew_casks:
  - name: api2convert
    # Only publish the cask on stable tags — a prerelease (e.g. v1.0.0-rc.1) must
    # not overwrite the stable formula that `brew install` serves.
    skip_upload: "auto"
    repository:
      owner: QaamGo
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://www.api2convert.com"
    description: "Convert, compress and transform files from the command line"
    # (macOS binaries are Developer ID-signed + notarized by the notarize.macos
    # block above, so no quarantine-strip hook is needed.)

scoops:
  # Same as the cask: skip the scoop manifest on prereleases.
  - skip_upload: "auto"
    repository:
      owner: QaamGo
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://www.api2convert.com"
    description: "Convert, compress and transform files from the command line"
    license: MIT

nfpms:
  - id: packages
    package_name: api2convert
    vendor: QaamGo
    homepage: "https://www.api2convert.com"
    maintainer: "QaamGo <support@qaamgo.com>"
    description: "Convert, compress and transform files from the command line"
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/bin

release:
  github:
    owner: QaamGo
    name: api2convert-cli
  prerelease: auto

changelog:
  # Use GitHub's native release-notes generator: entries read "<subject> by
  # @<user>" — @usernames only, NEVER author name+email. The `use: github`
  # (and `use: git`) formats embed the commit author's email, which leaked a
  # personal address into the v1.0.0-rc.1 notes. Keep release notes email-free.
  use: github-native
